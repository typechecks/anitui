# GoReleaser configuration for anitui
# https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/anitui/main.go
    binary: anitui
    ldflags:
      - -s -w -X github.com/anitui/anitui/internal/tui.Version={{.Version}}

archives:
  - formats: [tar.gz]
    # use zip for windows
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# AUR (Arch Linux)
nfpms:
  - file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Arch }}"
    package_name: anitui
    homepage: https://github.com/typechecks/anitui
    maintainer: typechecks
    description: a tui for browsing and streaming anime
    license: GPL-3.0
    formats:
      - deb
      - rpm
      - archlinux
