name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: publish to winget
        if: env.WINGET_TOKEN != ''
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: typechecks.anitui
          installers-regex: '\.zip$' # Matches the windows zip from goreleaser
          token: ${{ secrets.WINGET_TOKEN }}
