name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: publish to winget
        if: env.WINGET_TOKEN != ''
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: typechecks.anitui
          installers-regex: '\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  aur-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: prepare anitui PKGBUILD and SRCINFO
        run: |
          sed "s/__VERSION__/${{ needs.goreleaser.outputs.version }}/g" aur/anitui/PKGBUILD > /tmp/PKGBUILD-anitui
          sed "s/__VERSION__/${{ needs.goreleaser.outputs.version }}/g" aur/anitui/.SRCINFO > /tmp/SRCINFO-anitui

      - name: prepare anitui-bin PKGBUILD and SRCINFO
        run: |
          VERSION="${{ needs.goreleaser.outputs.version }}"
          RELEASE_URL="https://github.com/typechecks/anitui/releases/download/v${VERSION}"

          curl -fsSL "${RELEASE_URL}/anitui_linux_amd64.tar.gz" -o /tmp/anitui-x86_64.tar.gz
          curl -fsSL "${RELEASE_URL}/anitui_linux_arm64.tar.gz" -o /tmp/anitui-arm64.tar.gz

          SHA256_X86_64=$(sha256sum /tmp/anitui-x86_64.tar.gz | cut -d' ' -f1)
          SHA256_ARM64=$(sha256sum /tmp/anitui-arm64.tar.gz | cut -d' ' -f1)

          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA256_X86_64__/${SHA256_X86_64}/g" \
              -e "s/__SHA256_ARM64__/${SHA256_ARM64}/g" \
              aur/anitui-bin/PKGBUILD > /tmp/PKGBUILD-anitui-bin
          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA256_X86_64__/${SHA256_X86_64}/g" \
              -e "s/__SHA256_ARM64__/${SHA256_ARM64}/g" \
              aur/anitui-bin/.SRCINFO > /tmp/SRCINFO-anitui-bin

      - name: setup SSH for AUR
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keygen -lf ~/.ssh/aur_key
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking yes
            PubkeyAcceptedKeyTypes +ssh-ed25519
          EOF

      - name: publish PKGBUILDs to AUR
        if: env.AUR_SSH_PRIVATE_KEY != ''
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=yes"
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          publish_aur() {
            local pkgname="$1"
            local pkgbuild_path="$2"
            local srcinfo_path="$3"

            git clone "aur@aur.archlinux.org:${pkgname}.git" "/tmp/aur-${pkgname}"
            cp "$pkgbuild_path" "/tmp/aur-${pkgname}/PKGBUILD"
            cp "$srcinfo_path" "/tmp/aur-${pkgname}/.SRCINFO"
            cd "/tmp/aur-${pkgname}"

            git add PKGBUILD .SRCINFO
            git diff --staged --quiet || git commit -m "update to ${VERSION}"
            git push
          }

          publish_aur "anitui" "/tmp/PKGBUILD-anitui" "/tmp/SRCINFO-anitui"
          publish_aur "anitui-bin" "/tmp/PKGBUILD-anitui-bin" "/tmp/SRCINFO-anitui-bin"

  update-flake:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: update flake.nix version
        run: |
          VERSION="${{ needs.goreleaser.outputs.version }}"
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" flake.nix

      - name: commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add flake.nix
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "flake: bump version to ${VERSION}"
            git push origin main
          fi
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
